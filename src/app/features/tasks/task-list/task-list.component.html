<ul (click)="handleClick($event)">
  <li *ngFor="let task of tasks$ | async" [attr.data-id]="task.id">
    
    <input type="checkbox" [checked]="task.completed" data-action="toggle" />

    <span [style.textDecoration]="task.completed ? 'line-through' : 'none'">
      {{ task.title }}
    </span>

    <button data-action="delete">❌</button>

  </li>
</ul>
